<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Costa Blanca Tours — Intimate Luxury Experiences</title>
  <meta name="description" content="Intimate small-group luxury experiences on the Costa Blanca. Maximum 4 guests. Private car. All-inclusive. cbt.freddybremseth.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e0be72;
      --navy: #0a0f1c;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #080c18;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    h1, h2, h3, h4 {
      font-family: 'Playfair Display', serif;
      text-wrap: balance;
    }

    p { text-wrap: pretty; }

    input, select, textarea, button { font-family: 'DM Sans', sans-serif; }

    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3); }

    select option { background: #1a2030; color: white; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #080c18; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.4); border-radius: 3px; }

    @media (max-width: 768px) {
      .desktop-nav { display: none !important; }
      .mobile-controls { display: flex !important; }
      .about-grid { grid-template-columns: 1fr !important; }
      .contact-grid { grid-template-columns: 1fr !important; }
      .booking-grid { grid-template-columns: 1fr !important; }
      .detail-grid { grid-template-columns: 1fr !important; }
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<!-- Data -->
<script src="cbt-data.js"></script>
<script src="cbt-lang.js"></script>

<!-- Components (Babel JSX) -->
<script type="text/babel" src="cbt-nav.jsx"></script>
<script type="text/babel" src="cbt-home.jsx"></script>
<script type="text/babel" src="cbt-tours.jsx"></script>
<script type="text/babel" src="cbt-pages.jsx"></script>

<!-- App shell + Tweaks -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#c9a84c",
  "heroImage": "coastal",
  "cardStyle": "dark",
  "showStats": true
}/*EDITMODE-END*/;

function TweaksPanel({ tweaks, setTweak, onClose }) {
  const [pos, setPos] = React.useState({ x: null, y: null });
  const [dragging, setDragging] = React.useState(false);
  const [dragOff, setDragOff] = React.useState({ x: 0, y: 0 });
  const ref = React.useRef(null);

  const startDrag = (e) => {
    const rect = ref.current.getBoundingClientRect();
    setDragOff({ x: e.clientX - rect.left, y: e.clientY - rect.top });
    setDragging(true);
  };
  React.useEffect(() => {
    if (!dragging) return;
    const move = (e) => setPos({ x: e.clientX - dragOff.x, y: e.clientY - dragOff.y });
    const up = () => setDragging(false);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
  }, [dragging, dragOff]);

  const panelStyle = {
    position: 'fixed',
    right: pos.x !== null ? 'auto' : 24,
    bottom: pos.y !== null ? 'auto' : 24,
    left: pos.x !== null ? pos.x : 'auto',
    top: pos.y !== null ? pos.y : 'auto',
    zIndex: 9999,
    background: 'rgba(13,21,37,0.97)',
    border: '1px solid rgba(201,168,76,0.35)',
    borderRadius: 6,
    boxShadow: '0 20px 60px rgba(0,0,0,0.7)',
    width: 280,
    overflow: 'hidden',
    userSelect: 'none',
  };

  return (
    <div ref={ref} style={panelStyle}>
      <div onMouseDown={startDrag} style={{
        background: 'rgba(201,168,76,0.12)', borderBottom: '1px solid rgba(201,168,76,0.2)',
        padding: '0.75rem 1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        cursor: 'grab',
      }}>
        <span style={{ color: 'var(--gold)', fontFamily: 'DM Sans', fontSize: '0.75rem', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>◆ Tweaks</span>
        <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.5)', fontSize: '1.1rem', lineHeight: 1 }}>✕</button>
      </div>
      <div style={{ padding: '1.25rem', display: 'flex', flexDirection: 'column', gap: '1.25rem' }}>
        <div>
          <label style={{ display: 'block', color: 'rgba(255,255,255,0.5)', fontSize: '0.7rem', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Accent Colour</label>
          <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
            {[['#c9a84c','Gold'],['#2196a8','Ocean'],['#c0392b','Vermillion'],['#7c5cbf','Dusk']].map(([color, label]) => (
              <button key={color} onClick={() => setTweak('accentColor', color)} title={label} style={{
                width: 32, height: 32, borderRadius: 4, background: color, border: tweaks.accentColor === color ? '2px solid white' : '2px solid transparent',
                cursor: 'pointer', transition: 'border 0.2s',
              }} />
            ))}
          </div>
        </div>
        <div>
          <label style={{ display: 'block', color: 'rgba(255,255,255,0.5)', fontSize: '0.7rem', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Hero Image</label>
          <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
            {[['coastal','Coastal'],['mountain','Mountain'],['sunset','Sunset']].map(([val, label]) => (
              <button key={val} onClick={() => setTweak('heroImage', val)} style={{
                background: tweaks.heroImage === val ? 'var(--gold)' : 'rgba(255,255,255,0.07)',
                color: tweaks.heroImage === val ? '#0a0f1c' : 'rgba(255,255,255,0.6)',
                border: '1px solid', borderColor: tweaks.heroImage === val ? 'var(--gold)' : 'rgba(255,255,255,0.1)',
                borderRadius: 2, padding: '0.4rem 0.75rem', cursor: 'pointer',
                fontFamily: 'DM Sans', fontSize: '0.75rem', fontWeight: 500,
              }}>{label}</button>
            ))}
          </div>
        </div>
        <div>
          <label style={{ display: 'block', color: 'rgba(255,255,255,0.5)', fontSize: '0.7rem', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Card Style</label>
          <div style={{ display: 'flex', gap: '0.5rem' }}>
            {[['dark','Dark'],['bordered','Bordered']].map(([val, label]) => (
              <button key={val} onClick={() => setTweak('cardStyle', val)} style={{
                background: tweaks.cardStyle === val ? 'var(--gold)' : 'rgba(255,255,255,0.07)',
                color: tweaks.cardStyle === val ? '#0a0f1c' : 'rgba(255,255,255,0.6)',
                border: '1px solid', borderColor: tweaks.cardStyle === val ? 'var(--gold)' : 'rgba(255,255,255,0.1)',
                borderRadius: 2, padding: '0.4rem 0.75rem', cursor: 'pointer',
                fontFamily: 'DM Sans', fontSize: '0.75rem', fontWeight: 500,
              }}>{label}</button>
            ))}
          </div>
        </div>
        <div>
          <label style={{ display: 'flex', alignItems: 'center', gap: '0.6rem', cursor: 'pointer' }}>
            <div onClick={() => setTweak('showStats', !tweaks.showStats)} style={{
              width: 36, height: 20, borderRadius: 10, background: tweaks.showStats ? 'var(--gold)' : 'rgba(255,255,255,0.15)',
              position: 'relative', transition: 'background 0.2s', flexShrink: 0, cursor: 'pointer',
            }}>
              <div style={{
                position: 'absolute', top: 2, left: tweaks.showStats ? 18 : 2, width: 16, height: 16,
                borderRadius: '50%', background: 'white', transition: 'left 0.2s',
              }} />
            </div>
            <span style={{ color: 'rgba(255,255,255,0.6)', fontSize: '0.8rem' }}>Show Stats Bar</span>
          </label>
        </div>
      </div>
    </div>
  );
}

const HERO_IMAGES = {
  coastal: 'https://images.unsplash.com/photo-1602854127232-983309a47263?auto=format&fit=crop&q=85&w=1920',
  mountain: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=85&w=1920',
  sunset: 'https://images.unsplash.com/photo-1515238152791-8216bfdf89a7?auto=format&fit=crop&q=85&w=1920',
};

function App() {
  const [page, setPage] = React.useState('home');
  const [tourId, setTourId] = React.useState(null);
  const [tweaks, setTweaksState] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  // Expose setTourId globally so TourDetailPage sidebar links can use it
  window.__setTourId = (id) => { setTourId(id); setPage('tour-detail'); window.scrollTo(0,0); };

  const setTweak = (key, val) => {
    const updated = typeof key === 'object' ? { ...tweaks, ...key } : { ...tweaks, [key]: val };
    setTweaksState(updated);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: updated }, '*');
    // Apply accent color CSS var live
    if (updated.accentColor) document.documentElement.style.setProperty('--gold', updated.accentColor);
  };

  React.useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    // Apply saved accent
    document.documentElement.style.setProperty('--gold', tweaks.accentColor);
  }, []);

  // Scroll to top on page change
  React.useEffect(() => { window.scrollTo(0, 0); }, [page]);

  // Override HERO_IMG based on tweak
  window.HERO_IMG = HERO_IMAGES[tweaks.heroImage] || HERO_IMAGES.coastal;

  const renderPage = () => {
    switch(page) {
      case 'home':       return <HomePage setPage={setPage} setTourId={setTourId} showStats={tweaks.showStats} />;
      case 'tours':      return <ToursPage setPage={setPage} setTourId={setTourId} />;
      case 'tour-detail':return <TourDetailPage tourId={tourId} setPage={setPage} setTourId={setTourId} />;
      case 'about':      return <AboutPage setPage={setPage} />;
      case 'contact':    return <ContactPage />;
      case 'booking':    return <BookingPage setPage={setPage} />;
      default:           return <HomePage setPage={setPage} setTourId={setTourId} />;
    }
  };

  return (
    <>
      <Header page={page} setPage={setPage} tourId={tourId} />
      <main>{renderPage()}</main>
      <Footer setPage={setPage} />
      {showTweaks && (
        <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => {
          setShowTweaks(false);
          window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
        }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="80" fill="#080c18"/>
    <rect x="20" y="20" width="80" height="40" rx="3" fill="#0d1525" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
    <text x="60" y="43" text-anchor="middle" fill="#c9a84c" font-size="9" font-family="serif" font-weight="700">CBT</text>
    <line x1="35" y1="52" x2="85" y2="52" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
  </svg>
</template>

</body>
</html>
