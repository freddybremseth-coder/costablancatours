    about: { eyebrow: 'Vår historie', heroTitle: 'To lidenskaper. Ett reisemål.', heroItalic: 'Uendelige oppdagelser.', heroSubtitle: 'Costa Blanca Tours ble skapt av en enkel overbevisning: de beste reiseopplevelsene skjer når du senker tempoet, kobler deg til, og utforsker med noen som virkelig kjenner landet.', philEyebrow: 'Filosofien', philTitle: 'Små grupper. Store øyeblikk.', phil1: 'Vi begrenser hver tur til kun 4 gjester. Ikke fordi vi må — men fordi vi vil. Fire er det perfekte antallet der alle kan stille spørsmål, prøve alt og føle at de utforsker med venner.', phil2: 'Du vil aldri bli stresset. Aldri gå glipp av et øyeblikk. Aldri lure på om det er en bedre historie rett rundt hjørnet — for vi vet allerede, og tar deg dit.', phil3: 'Alt-inkludert betyr at vin, øl, tapas og gourmetmåltider alltid er en del av reisen. Ingen pinlige regninger. Ingen skjulte kostnader.', valuesTitle: 'Det som skiller oss', values: [{ title: 'Maks 4 gjester', desc: 'Små grupper gir rom for ekte samtaler, personlig oppmerksomhet og fleksibilitet til å tilpasse turen.' }, { title: 'Lokal ekspertise', desc: 'Våre guider er født og oppvokst på Costa Blanca. Dette er levd kunnskap, ikke innøvde manuskripter.' }, { title: 'Virkelig alt inkludert', desc: 'Vi vil at du skal smake alt, prøve alt og aldri bekymre deg for regningen. Premium lokale produkter uten ekstra kostnad.' }, { title: 'Autentiske forbindelser', desc: 'Møt vinprodusenten som steller vinstokkene, kokken som handler på morgensmarkedet. Disse forbindelsene forvandler en tur til et minne.' }], ctaTitle: 'Bli med oss på Costa Blanca', ctaText: 'Enten du er vinentusiast, matelsker eller bare en person som setter pris på vakker natur og ekte gjestfrihet — vi vil gjerne dele vår del av Middelhavet med deg.', ctaBtn: 'Utforsk opplevelser' },

    about: { eyebrow: 'Nuestra historia', heroTitle: 'Dos pasiones. Un destino.', heroItalic: 'Descubrimientos infinitos.', heroSubtitle: 'Costa Blanca Tours nació de una creencia simple: las mejores experiencias de viaje ocurren cuando desaceleran, conectan profundamente y exploran con alguien que verdaderamente conoce la tierra.', philEyebrow: 'La filosofía', philTitle: 'Grupos pequeños. Grandes momentos.', phil1: 'Limitamos cada tour a solo 4 huéspedes. No porque tengamos que hacerlo — sino porque queremos. Cuatro es el punto ideal donde todos pueden hacer preguntas, probar todo y sentir que exploran con amigos.', phil2: 'Nunca te apresurarán. Nunca perderás un momento. Nunca te preguntarás si hay una historia mejor a la vuelta de la esquina.', phil3: 'Nuestro enfoque todo incluido significa que el vino, la cerveza, las tapas y las comidas gourmet siempre forman parte del viaje. Sin facturas incómodas. Sin costes ocultos.', valuesTitle: 'Lo que nos diferencia', values: [{ title: 'Máximo 4 personas', desc: 'Los grupos pequeños crean espacio para conversaciones genuinas y atención personalizada.' }, { title: 'Experiencia local', desc: 'Nuestros guías nacieron y crecieron en la Costa Blanca. No es conocimiento ensayado — es experiencia vivida.' }, { title: 'Verdaderamente todo incluido', desc: 'Queremos que pruebes todo y nunca te preocupes por la factura. Productos locales premium sin coste adicional.' }, { title: 'Conexiones auténticas', desc: 'Conoce al viticultor, al chef que compra en el mercado. Estas conexiones transforman un tour en un recuerdo.' }], ctaTitle: 'Únete a nosotros en la Costa Blanca', ctaText: 'Ya seas un entusiasta del vino, un amante de la gastronomía o simplemente alguien que aprecia los paisajes y la hospitalidad genuina — nos encantaría compartir nuestro rincón del Mediterráneo contigo.', ctaBtn: 'Explorar experiencias' },

// Simple global language state using a mini event system
window.__lang = localStorage.getItem('cbt_lang') || 'no';
window.__langListeners = [];
window.__setLang = function(l) {
  window.__lang = l;
  localStorage.setItem('cbt_lang', l);
  window.__langListeners.forEach(fn => fn(l));
};

function useLang() {
  const [lang, setLang] = React.useState(window.__lang);
  React.useEffect(() => {
    const handler = (l) => setLang(l);
    window.__langListeners.push(handler);
    return () => { window.__langListeners = window.__langListeners.filter(fn => fn !== handler); };
  }, []);
  const t = TRANSLATIONS[lang] || TRANSLATIONS.en;
  return { lang, setLang: window.__setLang, t };
}

function LangSwitcher() {
  const { lang, setLang } = useLang();
  const [open, setOpen] = React.useState(false);

  return (
    <div style={{ position: 'relative' }}>
      <button onClick={() => setOpen(!open)} style={{
        background: 'rgba(255,255,255,0.07)', border: '1px solid rgba(255,255,255,0.12)',

        fontFamily: 'DM Sans, sans-serif', fontSize: '0.75rem', fontWeight: 600,
        letterSpacing: '0.06em', padding: '0.35rem 0.65rem',
        display: 'flex', alignItems: 'center', gap: '0.35rem',
        transition: 'all 0.2s',

        <span>{LANG_FLAGS[lang]?.flag}</span>
        <span>{LANG_FLAGS[lang]?.label}</span>
        <span style={{ opacity: 0.5, fontSize: '0.6rem' }}>▼</span>
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 8px)', right: 0,

            <button key={code} onClick={() => { setLang(code); setOpen(false); }} style={{
              display: 'flex', alignItems: 'center', gap: '0.6rem',
              width: '100%', background: lang === code ? 'rgba(201,168,76,0.12)' : 'transparent',

            >

<script type="text/babel">

function useReveal() {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.12 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, delay = 0, style = {} }) {
  const [ref, visible] = useReveal();
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(32px)',
      transition: `opacity 0.7s ease ${delay}ms, transform 0.7s ease ${delay}ms`,
      ...style

}

                <label style={labelStyle}>{b.dateLabel}</label>
                <input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} required style={{ ...inputStyle, colorScheme: 'dark' }} />
              </div>
              <div>
                <label style={labelStyle}>{b.guestsLabel}</label>
                <select value={form.guests} onChange={e => setForm(f => ({ ...f, guests: parseInt(e.target.value) }))} style={inputStyle}>
                  {[1,2,3,4].map(n => <option key={n} value={n}>{n}</option>)}
                </select>
              </div>
            </div>
          </div>

          <div style={{ marginBottom: '2.5rem' }}>
            <div style={{ color: 'var(--gold)', fontFamily: 'DM Sans', fontSize: '0.7rem', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: '1.5rem', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 24, height: 24, borderRadius: '50%', background: 'var(--gold)', color: '#0a0f1c', fontSize: '0.7rem', fontWeight: 700 }}>2</span>
              {b.step2}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.25rem', marginBottom: '1.25rem' }}>
              <div>
                <label style={labelStyle}>{b.nameLabel}</label>
                <input type="text" placeholder={b.namePlaceholder} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} required style={inputStyle} />
              </div>
              <div>
                <label style={labelStyle}>{b.emailLabel}</label>
                <input type="email" placeholder={b.emailPlaceholder} value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} required style={inputStyle} />
              </div>
              <div style={{ gridColumn: '1 / -1' }}>
                <label style={labelStyle}>{b.phoneLabel}</label>
                <input type="tel" placeholder={b.phonePlaceholder} value={form.phone} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} required style={inputStyle} />
              </div>
            </div>
            <div>
              <label style={labelStyle}>{b.notesLabel}</label>
              <textarea placeholder={b.notesPlaceholder} value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} rows={4} style={{ ...inputStyle, resize: 'vertical' }} />
            </div>
          </div>

          <button type="submit" disabled={submitting} style={{
            background: 'var(--gold)', color: '#0a0f1c', border: 'none', cursor: submitting ? 'wait' : 'pointer',
            fontFamily: 'DM Sans', fontSize: '0.875rem', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase',
            padding: '1.1rem 3rem', borderRadius: 2, opacity: submitting ? 0.7 : 1,
          }}>{submitting ? b.processingBtn : b.submitBtn}</button>
          <p style={{ color: 'rgba(255,255,255,0.3)', fontFamily: 'DM Sans', fontSize: '0.8rem', marginTop: '1rem' }}>{b.cancelNote}</p>
        </form>

        <div style={{ position: 'sticky', top: 92 }}>
          <div style={{ background: '#0d1525', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 4, padding: '2rem' }}>
            <h3 style={{ fontFamily: 'Playfair Display', color: 'white', fontSize: '1.1rem', fontWeight: 700, marginBottom: '1.5rem' }}>{b.summaryTitle}</h3>
            {selectedTour ? (
              <>
                <img src={selectedTour.image} alt={selectedTour.name} style={{ width: '100%', height: 140, objectFit: 'cover', borderRadius: 2, marginBottom: '1.25rem' }} />
                <div style={{ fontFamily: 'Playfair Display', color: 'white', fontSize: '1.05rem', fontWeight: 700, marginBottom: '0.5rem', lineHeight: 1.3 }}>{selectedTour.name}</div>
                <div style={{ color: 'rgba(255,255,255,0.4)', fontFamily: 'DM Sans', fontSize: '0.8rem', marginBottom: '1.5rem' }}>{selectedTour.duration}</div>
                <div style={{ borderTop: '1px solid rgba(255,255,255,0.08)', paddingTop: '1rem' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                    <span style={{ color: 'rgba(255,255,255,0.5)', fontFamily: 'DM Sans', fontSize: '0.875rem' }}>{selectedTour.price} × {form.guests}</span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '0.75rem', paddingTop: '0.75rem', borderTop: '1px solid rgba(255,255,255,0.08)' }}>
                    <span style={{ color: 'white', fontFamily: 'DM Sans', fontSize: '0.875rem', fontWeight: 700 }}>{b.totalLabel}</span>
                    <span style={{ color: 'var(--gold)', fontFamily: 'Playfair Display', fontSize: '1.4rem', fontWeight: 700 }}>€{total}</span>
                  </div>
                </div>
              </>
            ) : (
              <p style={{ color: 'rgba(255,255,255,0.3)', fontFamily: 'DM Sans', fontSize: '0.875rem', textAlign: 'center', padding: '2rem 0' }}>{b.selectTour}</p>
            )}
          </div>
          <div style={{ marginTop: '1.25rem', padding: '1.25rem', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 4 }}>
            {b.whyItems.map(item => (
              <div key={item} style={{ display: 'flex', alignItems: 'center', gap: '0.6rem', padding: '0.35rem 0' }}>
                <span style={{ color: 'var(--gold)', fontSize: '0.65rem' }}>✓</span>
                <span style={{ color: 'rgba(255,255,255,0.5)', fontFamily: 'DM Sans', fontSize: '0.8rem' }}>{item}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { AboutPage, ContactPage, BookingPage });

</script>

<!-- App shell + Tweaks -->
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#c9a84c",
  "heroImage": "coastal",
  "cardStyle": "dark",
  "showStats": true
}/*EDITMODE-END*/;

function TweaksPanel({ tweaks, setTweak, onClose }) {
  const [pos, setPos] = React.useState({ x: null, y: null });
  const [dragging, setDragging] = React.useState(false);
  const [dragOff, setDragOff] = React.useState({ x: 0, y: 0 });
  const ref = React.useRef(null);

  const startDrag = (e) => {
    const rect = ref.current.getBoundingClientRect();
    setDragOff({ x: e.clientX - rect.left, y: e.clientY - rect.top });
    setDragging(true);
  };
  React.useEffect(() => {
    if (!dragging) return;
    const move = (e) => setPos({ x: e.clientX - dragOff.x, y: e.clientY - dragOff.y });
    const up = () => setDragging(false);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
  }, [dragging, dragOff]);

  const panelStyle = {
    position: 'fixed',
    right: pos.x !== null ? 'auto' : 24,
    bottom: pos.y !== null ? 'auto' : 24,
    left: pos.x !== null ? pos.x : 'auto',
    top: pos.y !== null ? pos.y : 'auto',
    zIndex: 9999,
    background: 'rgba(13,21,37,0.97)',
    border: '1px solid rgba(201,168,76,0.35)',
    borderRadius: 6,
    boxShadow: '0 20px 60px rgba(0,0,0,0.7)',
    width: 280,
    overflow: 'hidden',
    userSelect: 'none',
  };

  return (
    <div ref={ref} style={panelStyle}>
      <div onMouseDown={startDrag} style={{
        background: 'rgba(201,168,76,0.12)', borderBottom: '1px solid rgba(201,168,76,0.2)',
        padding: '0.75rem 1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        cursor: 'grab',
      }}>
        <span style={{ color: 'var(--gold)', fontFamily: 'DM Sans', fontSize: '0.75rem', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>◆ Tweaks</span>
        <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.5)', fontSize: '1.1rem', lineHeight: 1 }}>✕</button>
      </div>
      <div style={{ padding: '1.25rem', display: 'flex', flexDirection: 'column', gap: '1.25rem' }}>
        <div>
          <label style={{ display: 'block', color: 'rgba(255,255,255,0.5)', fontSize: '0.7rem', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Accent Colour</label>
          <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
            {[['#c9a84c','Gold'],['#2196a8','Ocean'],['#c0392b','Vermillion'],['#7c5cbf','Dusk']].map(([color, label]) => (
              <button key={color} onClick={() => setTweak('accentColor', color)} title={label} style={{
                width: 32, height: 32, borderRadius: 4, background: color, border: tweaks.accentColor === color ? '2px solid white' : '2px solid transparent',
                cursor: 'pointer', transition: 'border 0.2s',
              }} />
            ))}
          </div>
        </div>
        <div>
          <label style={{ display: 'block', color: 'rgba(255,255,255,0.5)', fontSize: '0.7rem', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Hero Image</label>
          <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
            {[['coastal','Coastal'],['mountain','Mountain'],['sunset','Sunset']].map(([val, label]) => (
              <button key={val} onClick={() => setTweak('heroImage', val)} style={{
                background: tweaks.heroImage === val ? 'var(--gold)' : 'rgba(255,255,255,0.07)',
                color: tweaks.heroImage === val ? '#0a0f1c' : 'rgba(255,255,255,0.6)',
                border: '1px solid', borderColor: tweaks.heroImage === val ? 'var(--gold)' : 'rgba(255,255,255,0.1)',
                borderRadius: 2, padding: '0.4rem 0.75rem', cursor: 'pointer',
                fontFamily: 'DM Sans', fontSize: '0.75rem', fontWeight: 500,
              }}>{label}</button>
            ))}
          </div>
        </div>
        <div>
          <label style={{ display: 'block', color: 'rgba(255,255,255,0.5)', fontSize: '0.7rem', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Card Style</label>
          <div style={{ display: 'flex', gap: '0.5rem' }}>
            {[['dark','Dark'],['bordered','Bordered']].map(([val, label]) => (
              <button key={val} onClick={() => setTweak('cardStyle', val)} style={{
                background: tweaks.cardStyle === val ? 'var(--gold)' : 'rgba(255,255,255,0.07)',
                color: tweaks.cardStyle === val ? '#0a0f1c' : 'rgba(255,255,255,0.6)',
                border: '1px solid', borderColor: tweaks.cardStyle === val ? 'var(--gold)' : 'rgba(255,255,255,0.1)',
                borderRadius: 2, padding: '0.4rem 0.75rem', cursor: 'pointer',
                fontFamily: 'DM Sans', fontSize: '0.75rem', fontWeight: 500,
              }}>{label}</button>
            ))}
          </div>
        </div>
        <div>
          <label style={{ display: 'flex', alignItems: 'center', gap: '0.6rem', cursor: 'pointer' }}>
            <div onClick={() => setTweak('showStats', !tweaks.showStats)} style={{
              width: 36, height: 20, borderRadius: 10, background: tweaks.showStats ? 'var(--gold)' : 'rgba(255,255,255,0.15)',
              position: 'relative', transition: 'background 0.2s', flexShrink: 0, cursor: 'pointer',
            }}>
              <div style={{
                position: 'absolute', top: 2, left: tweaks.showStats ? 18 : 2, width: 16, height: 16,
                borderRadius: '50%', background: 'white', transition: 'left 0.2s',
              }} />
            </div>
            <span style={{ color: 'rgba(255,255,255,0.6)', fontSize: '0.8rem' }}>Show Stats Bar</span>
          </label>
        </div>
      </div>
    </div>
  );
}

const HERO_IMAGES = {
  coastal: 'https://images.unsplash.com/photo-1602854127232-983309a47263?auto=format&fit=crop&q=85&w=1920',
  mountain: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=85&w=1920',
  sunset: 'https://images.unsplash.com/photo-1515238152791-8216bfdf89a7?auto=format&fit=crop&q=85&w=1920',
};

function App() {
  const [page, setPage] = React.useState('home');
  const [tourId, setTourId] = React.useState(null);
  const [tweaks, setTweaksState] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  // Expose setTourId globally so TourDetailPage sidebar links can use it
  window.__setTourId = (id) => { setTourId(id); setPage('tour-detail'); window.scrollTo(0,0); };

  const setTweak = (key, val) => {
    const updated = typeof key === 'object' ? { ...tweaks, ...key } : { ...tweaks, [key]: val };
    setTweaksState(updated);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: updated }, '*');
    // Apply accent color CSS var live
    if (updated.accentColor) document.documentElement.style.setProperty('--gold', updated.accentColor);
  };

  React.useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    // Apply saved accent
    document.documentElement.style.setProperty('--gold', tweaks.accentColor);
  }, []);

  // Scroll to top on page change
  React.useEffect(() => { window.scrollTo(0, 0); }, [page]);

  // Override HERO_IMG based on tweak
  window.HERO_IMG = HERO_IMAGES[tweaks.heroImage] || HERO_IMAGES.coastal;

  const renderPage = () => {
    switch(page) {
      case 'home':       return <HomePage setPage={setPage} setTourId={setTourId} showStats={tweaks.showStats} />;
      case 'tours':      return <ToursPage setPage={setPage} setTourId={setTourId} />;
      case 'tour-detail':return <TourDetailPage tourId={tourId} setPage={setPage} setTourId={setTourId} />;
      case 'about':      return <AboutPage setPage={setPage} />;
      case 'contact':    return <ContactPage />;
      case 'booking':    return <BookingPage setPage={setPage} />;
      default:           return <HomePage setPage={setPage} setTourId={setTourId} />;
    }
  };

  return (
    <>
      <Header page={page} setPage={setPage} tourId={tourId} />
      <main>{renderPage()}</main>
      <Footer setPage={setPage} />
      {showTweaks && (
        <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => {
          setShowTweaks(false);
          window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
        }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
